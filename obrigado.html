  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0b0b;
      --surface: #131313;
      --border:  rgba(255,255,255,0.07);
      --gold:    #1232C8;
      --gold-dim:rgba(18,50,200,0.12);
      --gold-bd: rgba(18,50,200,0.22);
      --white:   #f0f0f0;
      --mid:     #999;
      --dim:     #666;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 56px;
      text-decoration: none;
    }

    .logo svg { width: 28px; height: 28px; }

    .logo-name {
      font-family: 'Anton', 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--white);
    }

    .success-ico {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--gold-bd);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .success-ico svg {
      width: 34px;
      height: 34px;
      stroke: var(--gold);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .title {
      font-family: 'Anton', 'Inter', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
      line-height: 1.08;
      margin-bottom: 16px;
    }

    .title span { color: var(--gold); }

    .desc {
      color: var(--mid);
      font-size: 1rem;
      line-height: 1.75;
      max-width: 420px;
      margin: 0 auto 44px;
    }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 15px 32px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }

    .btn-wa:hover  { background: #1ebe5c; transform: translateY(-2px); }
    .btn-wa:active { transform: translateY(0); }

    .btn-wa svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .hint {
      color: var(--dim);
      font-size: 0.78rem;
      margin-top: 18px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 48px auto;
    }

    .back {
      color: var(--dim);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.18s;
    }

    .back:hover { color: var(--mid); }
  </style>
</head>
<body>

  <a href="/" class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="28" height="28" rx="7" fill="#1232C8"/>
      <path d="M10 20 Q10 16 14 16 Q16 16 16 14 Q16 12 18 12 Q22 12 22 16 Q22 20 18 20 Z" fill="white" opacity="0.9"/>
      <circle cx="11" cy="11" r="2" fill="white" opacity="0.7"/>
      <circle cx="21" cy="11" r="2" fill="white" opacity="0.7"/>
    </svg>
    <span class="logo-name">FLUXXO PET</span>
  </a>

  <div class="success-ico">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1 class="title">Diagnóstico <span>recebido!</span></h1>

  <p class="desc">
    Recebemos suas informações e nosso time já está analisando o seu caso.
    Em breve entraremos em contato pelo WhatsApp para apresentar o diagnóstico.
  </p>
